<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Calculadora de Porcentajes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      touch-action: manipulation;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: align-items 0.3s;
    }

    body.align-top {
      align-items: flex-start;
    }

    body.align-bottom {
      align-items: flex-end;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 16px;
    }

    /* ---- INPUT CON BOTÓN LIMPIAR ---- */
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input[type="text"] {
      width: 100%;
      padding: 12px 48px 12px 16px;
      font-size: 1.2rem;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border 0.2s;
    }

    .input-wrapper input[type="text"]:focus {
      border-color: #4f46e5;
    }

    .input-wrapper input[readonly] {
      background: #fafafa;
      cursor: default;
      caret-color: transparent;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      background: #e5e7eb;
      border: none;
      border-radius: 6px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: #6b7280;
      transition: background 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      background: #dc2626;
      color: white;
    }

    /* ---- RESULTADOS ---- */
    .results {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: #f5f3ff;
      border-left: 4px solid #4f46e5;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-card .label {
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
    }

    .result-card .value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #4f46e5;
    }

    /* ---- TECLADO NUMÉRICO ---- */
    .numpad-wrapper {
      margin-top: 20px;
      background: #ede9fe;
      border-radius: 14px;
      padding: 12px;
      display: none;
    }

    .numpad-wrapper.visible {
      display: block;
    }

    .numpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .numpad-key {
      background: white;
      border: 2px solid #e0e7ff;
      border-radius: 10px;
      font-size: 1.5rem;
      font-weight: 500;
      color: #1a1a2e;
      padding: 18px 10px;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 2px 0 #c4b5fd;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }

    .numpad-key:active {
      background: #f5f3ff;
      transform: scale(0.96);
      box-shadow: none;
    }

    .numpad-key.key-comma {
      background: #f5f3ff;
      color: #4f46e5;
      font-weight: 700;
      border-color: #c4b5fd;
      box-shadow: 0 2px 0 #a78bfa;
    }

    .numpad-key.key-comma:active {
      background: #ede9fe;
      box-shadow: none;
    }

    .numpad-key.key-delete {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #dc2626;
      font-size: 1.3rem;
      box-shadow: 0 2px 0 #f87171;
    }

    .numpad-key.key-delete:active {
      background: #fca5a5;
      box-shadow: none;
    }

    .numpad-key.key-clear {
      grid-column: span 3;
      background: #fee2e2;
      border-color: #fca5a5;
      color: #dc2626;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 10px;
      box-shadow: 0 2px 0 #f87171;
    }

    .numpad-key.key-clear:active {
      background: #fca5a5;
      box-shadow: none;
    }

    /* ---- BOTÓN ACORDEÓN ---- */
    .config-toggle {
      margin-top: 24px;
    }

    .config-toggle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: #f5f3ff;
      border: 2px solid #e0e7ff;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .config-toggle-btn:hover {
      background: #ede9fe;
      border-color: #4f46e5;
    }

    .config-toggle-btn.open {
      background: #4f46e5;
      border-color: #4f46e5;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .config-toggle-btn.open .btn-label {
      color: white;
    }

    .config-toggle-btn.open .btn-chevron {
      color: white;
      transform: rotate(180deg);
    }

    .btn-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #4f46e5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-chevron {
      font-size: 1rem;
      color: #4f46e5;
      transition: transform 0.3s ease;
    }

    /* ---- PANEL DE CONFIGURACIÓN ---- */
    .config-panel {
      display: none;
      background: #fafafa;
      border: 2px solid #4f46e5;
      border-top: none;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      padding: 20px;
      outline: none;
    }

    .config-panel.open {
      display: block;
    }

    .config-panel h2 {
      font-size: 1rem;
      color: #333;
      margin-bottom: 14px;
    }

    .config-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .config-section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .config-section label {
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .config-section input[type="number"] {
      font-size: 1rem;
      padding: 9px 12px;
    }

    .input-hint {
      font-size: 0.8rem;
      color: #888;
      margin-top: 5px;
    }

    /* ---- TOGGLE SWITCH ---- */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }

    .toggle-row span {
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 26px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: #4f46e5;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .commission-fields {
      transition: opacity 0.2s;
      margin-top: 14px;
    }

    .commission-fields.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ---- ALINEACIÓN ---- */
    .align-selector {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .align-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #e0e7ff;
      background: white;
      color: #6b7280;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .align-btn .align-icon {
      font-size: 1.1rem;
    }

    .align-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
      background: #f5f3ff;
    }

    .align-btn.active {
      border-color: #4f46e5;
      background: #4f46e5;
      color: white;
    }

    /* ---- PORCENTAJES ---- */
    .percentage-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .percentage-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .percentage-item input[type="number"] {
      width: 90px;
      padding: 8px 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #ddd;
      outline: none;
      transition: border 0.2s;
    }

    .percentage-item input[type="number"]:focus {
      border-color: #4f46e5;
    }

    .percentage-item span {
      font-size: 1rem;
      color: #555;
      font-weight: 600;
    }

    .percentage-item button.remove-btn {
      background: #fee2e2;
      border: none;
      color: #dc2626;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .percentage-item button.remove-btn:hover {
      background: #fca5a5;
    }

    .config-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .config-actions button {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-add {
      background: #d1fae5;
      color: #065f46;
    }

    .btn-add:hover {
      background: #a7f3d0;
    }

    .btn-reset {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-reset:hover {
      background: #e5e7eb;
    }

    .save-msg {
      margin-top: 12px;
      text-align: center;
      font-size: 0.85rem;
      color: #059669;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-msg.visible {
      opacity: 1;
    }

    @media (max-width: 400px) {
      .container {
        padding: 22px 16px;
      }

      h1 {
        font-size: 1.2rem;
      }

      .numpad-key {
        font-size: 1.3rem;
        padding: 15px 10px;
      }
    }
  </style>
</head>
<body id="appBody">

<div class="container">
  <h1>🧮 Calculadora de Porcentajes</h1>

  <!-- Campo valor base -->
  <div class="input-group">
    <label for="inputValue">Valor base</label>
    <div class="input-wrapper">
      <input
        type="text"
        id="inputValue"
        inputmode="decimal"
        placeholder="0"
        oninput="sanitizeNumericInput(this)"
      />
      <button class="clear-btn" onclick="clearInput()" title="Limpiar valor">✕</button>
    </div>
  </div>

  <!-- Resultados -->
  <div class="results" id="results"></div>

  <!-- Teclado numérico -->
  <div class="numpad-wrapper" id="numpadWrapper">
    <div class="numpad-grid">
      <button class="numpad-key" onclick="numpadPress('7')">7</button>
      <button class="numpad-key" onclick="numpadPress('8')">8</button>
      <button class="numpad-key" onclick="numpadPress('9')">9</button>
      <button class="numpad-key" onclick="numpadPress('4')">4</button>
      <button class="numpad-key" onclick="numpadPress('5')">5</button>
      <button class="numpad-key" onclick="numpadPress('6')">6</button>
      <button class="numpad-key" onclick="numpadPress('1')">1</button>
      <button class="numpad-key" onclick="numpadPress('2')">2</button>
      <button class="numpad-key" onclick="numpadPress('3')">3</button>
      <button class="numpad-key key-delete" onclick="numpadDelete()">⌫</button>
      <button class="numpad-key key-zero"   onclick="numpadPress('0')">0</button>
      <button class="numpad-key key-comma"  onclick="numpadPress('.')">.</button>
      <button class="numpad-key key-clear"  onclick="clearInput()">✕ Limpiar todo</button>
    </div>
  </div>

  <!-- Acordeón configuración -->
  <div class="config-toggle">
    <button class="config-toggle-btn" id="configToggleBtn" onclick="toggleConfig()">
      <span class="btn-label">⚙️ Configuración</span>
      <span class="btn-chevron">▼</span>
    </button>

    <div class="config-panel" id="configPanel">

      <!-- Sección: alineación -->
      <div class="config-section">
        <h2>↕️ Posición del contenido</h2>
        <div class="align-selector">
          <button class="align-btn" id="alignTop" onclick="setAlignment('top')">
            <span class="align-icon">⬆️</span>
            <span>Arriba</span>
          </button>
          <button class="align-btn" id="alignCenter" onclick="setAlignment('center')">
            <span class="align-icon">⬛</span>
            <span>Centro</span>
          </button>
          <button class="align-btn" id="alignBottom" onclick="setAlignment('bottom')">
            <span class="align-icon">⬇️</span>
            <span>Abajo</span>
          </button>
        </div>
      </div>

      <!-- Sección: teclado en pantalla -->
      <div class="config-section">
        <h2>⌨️ Modo de entrada</h2>
        <div class="toggle-row">
          <span>Usar teclado en pantalla</span>
          <label class="switch">
            <input type="checkbox" id="toggleNumpadConfig" onchange="onToggleNumpadConfig()" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Sección: comisión fija -->
      <div class="config-section">
        <h2>💰 Comisión fija</h2>
        <div class="toggle-row">
          <span>Mostrar comisión en resultados</span>
          <label class="switch">
            <input type="checkbox" id="toggleCommission" onchange="onToggleCommission()" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="commission-fields" id="commissionFields">
          <label for="configCommission">Valor de comisión</label>
          <input
            type="number"
            id="configCommission"
            inputmode="numeric"
            min="0"
            placeholder="1.3"
            oninput="autoSave()"
          />
          <p class="input-hint">Se suma al total de cada resultado</p>
        </div>
      </div>

      <!-- Sección: porcentajes -->
      <div class="config-section">
        <h2>📊 Porcentajes a calcular</h2>
        <div class="percentage-list" id="percentageList"></div>
        <div class="config-actions">
          <button class="btn-add" onclick="addPercentage()">+ Agregar</button>
          <button class="btn-reset" onclick="resetConfig()">↺ Restablecer</button>
        </div>
      </div>

      <p class="save-msg" id="saveMsg">✅ Configuración guardada automáticamente</p>
    </div>
  </div>
</div>

<script>
  const DEFAULT_PERCENTAGES     = [10, 35];
  const DEFAULT_COMMISSION      = 1.3;
  const DEFAULT_SHOW_COMMISSION = true;
  const DEFAULT_USE_NUMPAD      = false;
  const DEFAULT_ALIGNMENT       = 'center';
  const STORAGE_KEY             = 'calc_percentages';
  const STORAGE_COMMISSION_KEY  = 'calc_commission';
  const STORAGE_SHOW_KEY        = 'calc_show_commission';
  const STORAGE_NUMPAD_KEY      = 'calc_use_numpad';
  const STORAGE_ALIGN_KEY       = 'calc_alignment';

  // ── Alineación ────────────────────────────────────────────
  function loadAlignment() {
    return localStorage.getItem(STORAGE_ALIGN_KEY) || DEFAULT_ALIGNMENT;
  }

  function applyAlignment(value) {
    const body = document.getElementById('appBody');
    body.classList.remove('align-top', 'align-bottom');
    if (value === 'top')    body.classList.add('align-top');
    if (value === 'bottom') body.classList.add('align-bottom');

    // Actualizar botones activos
    ['top', 'center', 'bottom'].forEach(v => {
      const btn = document.getElementById('align' + v.charAt(0).toUpperCase() + v.slice(1));
      if (btn) btn.classList.toggle('active', v === value);
    });
  }

  function setAlignment(value) {
    localStorage.setItem(STORAGE_ALIGN_KEY, value);
    applyAlignment(value);
    showSaveMsg();
  }

  // ── Teclado en pantalla ───────────────────────────────────
  function loadUseNumpad() {
    const stored = localStorage.getItem(STORAGE_NUMPAD_KEY);
    return stored !== null ? stored === 'true' : DEFAULT_USE_NUMPAD;
  }

  function applyNumpadState(active) {
    const input   = document.getElementById('inputValue');
    const wrapper = document.getElementById('numpadWrapper');
    document.getElementById('toggleNumpadConfig').checked = active;
    if (active) {
      input.setAttribute('readonly', true);
      input.setAttribute('inputmode', 'none');
      wrapper.classList.add('visible');
    } else {
      input.removeAttribute('readonly');
      input.setAttribute('inputmode', 'decimal');
      wrapper.classList.remove('visible');
    }
  }

  function onToggleNumpadConfig() {
    const active = document.getElementById('toggleNumpadConfig').checked;
    localStorage.setItem(STORAGE_NUMPAD_KEY, active);
    applyNumpadState(active);
    autoSave();
  }

  // ── Sanitizar entrada libre (sin numpad) ─────────────────
  function sanitizeNumericInput(input) {
    // iOS en locale español inserta coma como separador decimal → normalizamos a punto
    let val = input.value.replace(/,/g, '.').replace(/[^0-9.]/g, '');
    const dotIndex = val.indexOf('.');
    if (dotIndex !== -1) {
      val = val.slice(0, dotIndex + 1) + val.slice(dotIndex + 1).replace(/\./g, '');
    }
    if (input.value !== val) input.value = val;
    calculate();
  }

  // ── Teclado: pulsación ────────────────────────────────────
  function numpadPress(key) {
    const input   = document.getElementById('inputValue');
    let current   = input.value;
    if (key === '.') {
      if (current.includes('.')) return;
      input.value = current === '' ? '0.' : current + '.';
    } else {
      input.value = (current === '0') ? key : current + key;
    }
    calculate();
  }

  // ── Teclado: borrar último dígito ─────────────────────────
  function numpadDelete() {
    const input = document.getElementById('inputValue');
    input.value = input.value.slice(0, -1);
    calculate();
  }

  // ── Limpiar campo valor base ──────────────────────────────
  function clearInput() {
    const input = document.getElementById('inputValue');
    input.value = '';
    if (!loadUseNumpad()) input.focus();
    calculate();
  }

  // ── Porcentajes ───────────────────────────────────────────
  function loadPercentages() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      } catch (e) {}
    }
    return [...DEFAULT_PERCENTAGES];
  }

  // ── Comisión ──────────────────────────────────────────────
  function loadCommission() {
    const stored = localStorage.getItem(STORAGE_COMMISSION_KEY);
    if (stored !== null && !isNaN(parseFloat(stored))) return parseFloat(stored);
    return DEFAULT_COMMISSION;
  }

  function loadShowCommission() {
    const stored = localStorage.getItem(STORAGE_SHOW_KEY);
    return stored !== null ? stored === 'true' : DEFAULT_SHOW_COMMISSION;
  }

  // ── Guardar automáticamente ───────────────────────────────
  function autoSave() {
    const list = document.getElementById('percentageList');
    const inputs = list.querySelectorAll('input[type="number"]');
    const values = [];
    inputs.forEach(input => {
      const v = parseFloat(input.value);
      if (!isNaN(v) && v >= 0) values.push(v);
    });
    if (values.length > 0) localStorage.setItem(STORAGE_KEY, JSON.stringify(values));

    const comRaw = parseFloat(document.getElementById('configCommission').value);
    localStorage.setItem(STORAGE_COMMISSION_KEY, isNaN(comRaw) ? DEFAULT_COMMISSION : comRaw);
    localStorage.setItem(STORAGE_SHOW_KEY, document.getElementById('toggleCommission').checked);

    showSaveMsg();
    calculate();
  }

  // ── Mensaje guardado ──────────────────────────────────────
  let saveTimeout = null;
  function showSaveMsg() {
    const msg = document.getElementById('saveMsg');
    msg.classList.add('visible');
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => msg.classList.remove('visible'), 2000);
  }

  // ── Toggle comisión ───────────────────────────────────────
  function onToggleCommission() {
    const checked = document.getElementById('toggleCommission').checked;
    document.getElementById('commissionFields').classList.toggle('disabled', !checked);
    autoSave();
  }

  // ── Calcular ──────────────────────────────────────────────
  function calculate() {
    const rawVal = document.getElementById('inputValue').value;
    const val = (rawVal === '' || isNaN(parseFloat(rawVal))) ? 0 : parseFloat(rawVal);
    const showCommission = loadShowCommission();
    const commission = showCommission ? loadCommission() : 0;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';
    loadPercentages().forEach(p => {
      const result = val + val * (p / 100) + commission;
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <span class="label">Valor + ${p}%${showCommission ? ' + comisión' : ''}</span>
        <span class="value">${formatNumber(result)}</span>
      `;
      resultsDiv.appendChild(card);
    });
  }

  function formatNumber(num) {
    return num.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── Acordeón ──────────────────────────────────────────────
  function toggleConfig() {
    const panel  = document.getElementById('configPanel');
    const btn    = document.getElementById('configToggleBtn');
    const isOpen = panel.classList.contains('open');
    if (!isOpen) {
      renderConfigList();
      if (document.activeElement) document.activeElement.blur();
    }
    panel.classList.toggle('open');
    btn.classList.toggle('open');
    if (!isOpen) {
      setTimeout(() => {
        panel.setAttribute('tabindex', '-1');
        panel.focus();
      }, 50);
    }
  }

  // ── Renderizar config ─────────────────────────────────────
  function renderConfigList() {
    const list = document.getElementById('percentageList');
    const percentages = loadPercentages();
    list.innerHTML = '';
    percentages.forEach((p, i) => list.appendChild(makePercentageItem(p, i)));
    updateRemoveButtons();

    document.getElementById('configCommission').value = loadCommission();
    const show = loadShowCommission();
    document.getElementById('toggleCommission').checked = show;
    document.getElementById('commissionFields').classList.toggle('disabled', !show);
    document.getElementById('toggleNumpadConfig').checked = loadUseNumpad();

    // Marcar botón de alineación activo
    applyAlignment(loadAlignment());
  }

  // ── Ítem porcentaje ───────────────────────────────────────
  function makePercentageItem(value, index) {
    const item = document.createElement('div');
    item.className = 'percentage-item';
    item.innerHTML = `
      <input type="number" inputmode="numeric" id="pct_${index}" value="${value}" min="0" max="10000" oninput="autoSave()" />
      <span>%</span>
      <button class="remove-btn" onclick="removePercentage(${index})">✕ Quitar</button>
    `;
    return item;
  }

  function updateRemoveButtons() {
    const list = document.getElementById('percentageList');
    const items = list.querySelectorAll('.percentage-item');
    const showRemove = items.length >= 2;
    items.forEach(item => {
      item.querySelector('.remove-btn').style.display = showRemove ? 'inline-flex' : 'none';
    });
  }

  function addPercentage() {
    const list = document.getElementById('percentageList');
    list.appendChild(makePercentageItem(0, list.children.length));
    refreshIds();
    updateRemoveButtons();
    autoSave();
  }

  function removePercentage(index) {
    const list = document.getElementById('percentageList');
    if (list.children.length <= 1) return;
    list.children[index].remove();
    refreshIds();
    updateRemoveButtons();
    autoSave();
  }

  function refreshIds() {
    const list = document.getElementById('percentageList');
    Array.from(list.children).forEach((item, i) => {
      item.querySelector('input').id = `pct_${i}`;
      item.querySelector('button').setAttribute('onclick', `removePercentage(${i})`);
    });
  }

  // ── Restablecer ───────────────────────────────────────────
  function resetConfig() {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_COMMISSION_KEY);
    localStorage.removeItem(STORAGE_SHOW_KEY);
    localStorage.removeItem(STORAGE_NUMPAD_KEY);
    localStorage.removeItem(STORAGE_ALIGN_KEY);
    applyNumpadState(DEFAULT_USE_NUMPAD);
    applyAlignment(DEFAULT_ALIGNMENT);
    renderConfigList();
    calculate();
    showSaveMsg();
  }

  // ── Inicializar ───────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    applyAlignment(loadAlignment());
    applyNumpadState(loadUseNumpad());
    calculate();
  });
</script>

</body>
</html>
